<!DOCTYPE html>

<html>

    <head>

        <link rel="icon" href="./img/hari.jpg">

        <title>PA Admission form</title>

    </head>

    <body>

        <header>

            <h2>Welcome to PA college of engineering and technology</h2>
            <h3>Our Motive   1.Learn   2.Work   3.Succeed</h3>
            <h4>Register your child's admission here for their bright future</h4>

        </header>

        <main>

            <form>

                <label for="name">Enter your name :</label>

                <input type="text" id="name" minlength="5" maxlength="50" required>

                <br>



                <label for="email">Enter your email :</label>

                <input type="email" id="email">

                <br>



                <label for="password" minlength="4" maxlength="20" required>Password :</label>

                <input type="password" id="password">

                <br>



                <label for="dob">Enter your DOB:</label>

                <input type="date" id="dob" required>

                <br>



                <label for="gender">Male</label>

                <input type="radio" id="gender" name="gender" required>

                <label for="gender">Female</label>

                <input type="radio" id="gender" name="gender" required>

                <label for="gender">Transgender</label>

                <input type="radio" id="gender" name="gender"required>

                <br>



                <label for="skill">Enter your skills :</label>

                <textarea id="skill" placeholder="Enter the skills here"></textarea>

                <br>



                <label for="course">Select your course :</label>

                <select id="course">

                    <option>ECE</option>

                    <option>EEE</option>

                    <option>Mech</option>

                    <option>CSE</option>

                    <option>AI&DS</option>

                    <option>AI&ML</option>

                </select>

                <br>



                <label for="Address">Enter your address :</label>

                <textarea id="address" placeholder="Enter your address here" required></textarea>

                <br>



                <label for="file">Upload the student Biodata :</label>

                <input id="file" type="file">

                <footer>

                    <button type="submit" onclick="alert('Form submitted. Please visit college to complete the admission and fees payment. Please come with the required documents')">submit</button>

                    <button type="reset">Reset</button>

                </footer>

            </form>

        </main>

    </body>

</html>
