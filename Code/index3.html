<!DOCTYPE html>
<html>
    <head>
        <title>Admission form</title>
        <link rel="icon" href="C:\Users\rhari\OneDrive\Desktop\Code\img\hari2.jpeg">
    </head>
    <body>
        <header>
            <h1>College Admission Form</h1>
        </header>
        <main>
            <form>
                <label for="name">Name:</label>
                <input id="name" type="text" minlength="2" maxlength="10" placeholder="Enter your name" required>
                <input type="radio" name="gender" value="male">
                <label for="male">Male</label>
                <input type="radio" name="gender" value="female">
                <label for="female">Female</label> 
                <br>
                <label for="course">Select your course:</label>
                <select id="course">
                    <option value="cs">Computer Science</option>
                    <option value="IT">Information Technology</option>
                    <option value="AI">B.Tech:AI&DS</option>
                </select>
            </form>
            <section>
                <label for="address">Address:</label>
                <textarea id="address" placeholder="Enter your address here" required></textarea>
            </section>
        </main>
        <footer>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </footer>
    </body>
</html>
