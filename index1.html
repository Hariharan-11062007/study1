<!DOCTYPE html>
<html>
    <head>
        <title>contact form</title>
        <link rel="icon" href="C:\Users\rhari\OneDrive\Desktop\Code\img\hari2.jpeg">
    </head>
    <body>
            <h1 style="text-align: center;">Contact form</h1>
            <hr>
        <body>
           <form action="index.html">
                <main>
                    <label for="name">Name:</label>
                    <input id="name" type="text" minlength="2" maxlength="10" placeholder="Enter your name" required>
                </main> 
                <section>
                    <label for="email">Email:</label>
                    <input id="email" type="email" placeholder="Enter your email" required>
                    <label for="message">Message:</label>
                    <textarea id="message" placeholder="Enter your Message here" required></textarea>
                    <hr>
                </section>
                <footer>
                    <button type="submit">Finish</button>
                    <button type="reset">Reset</button>
                </footer>
              </form>
        </body>
    </body>
</html>
